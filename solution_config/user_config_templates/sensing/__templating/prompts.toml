# This file defines the questions that will be asked to generate a user configuration file.
# Each question has a unique key, a type, and other parameters depending on the type.
# The criteria field is used to determine when a question should be asked, based on previous answers.
# Criteria can use 'and' (&) and 'or' (|) operators, and parentheses for grouping.
# for example: criteria = "a=1 & (b=2 | b=3)" means the question 
# will be asked if the 'a' is '1' and the 'b' is either '2' or '3'.

# The value of a question can be referenced in the user configuration template using {{<key>}}.
# The following question types are supported:
# - text: free text input from the user
#     [Q.<key>]
#       type = "text"
#       criteria = "<criteria>"
#       prompt = "<prompt>"         # what the user is asked
# - select: user selects from a list of options
#     [Q.<key>]
#       type = "select"
#       criteria = "<criteria>"
#       prompt = "<prompt>"         # what the user is asked
#       # each option is defined as:
#       opt.<value> = "<option_text>" 
#       opt.<next_value> = "<next_option_text>"  

[Q.enabled]
  type = "bool"
  prompt = "Enable sensing module?"

[Q.machine_name]
  criteria = "enabled=true"
  type = "text"
  prompt = "Choose a name for this machine"

[Q.sensor_type]
  criteria = "enabled=true"
  type = "select"
  prompt = "Which type of sensor are you using to monitor the machine's running status?"
  opt.digital_input = "Digital input (e.g. running light)"
  opt.current_clamp = "Current clamp (detect machine running from current draw)"

[Q.digin_device]
  criteria = "enabled=true & sensor_type=digital_input"
  type = "select"
  prompt = "Which digital input device are you using"
  opt.Sequent8DigitalInputs = "Sequent 8 channel High Voltage Digital Inputs"
  opt.Sequent16DigitalInputs = "Sequent 16 channel Low Voltage Digital Inputs"
  #opt.seq_uni = "Sequent 16 channel Universal Inputs ADC"

[Q.channel]
  criteria = "enabled=true & sensor_type=digital_input"
  type = "text"
  prompt = "Which digital input channel is the machine's running light plugged into?"


[Q.variant]
  criteria = "enabled=true & sensor_type=current_clamp"
  type = "select"
  prompt = "Which power monitoring variant are you deploying?"
  opt.basic = "basic"
  opt.intermediate = "intermediate"
  opt.advanced = "advanced"
  opt.simulator = "simulator"

[Q.adc]
  criteria = "variant=basic"
  type = "select"
  prompt = "Which ADC are you using?"
  opt.grove_1 = "Grove ADC v1.0"
  opt.grove_11 = "Grove ADC v1.1"
  opt.ads = "ADS1115"
  opt.bcr = "BC Robotics"
  opt.sequent = "Sequent 16 channel Universal Inputs ADC"

[Q.phases]
  criteria = "variant=intermediate | variant=advanced"
  type = "select"
  prompt = "How many phases are you monitoring?"
  opt.1p = "single phase"
  opt.3p = "three phase"

[Q.setup_basic]
  criteria = "variant=basic"
  type = "select"
  prompt = "Which sensing configuration are you using?"
  opt.1p = "Single phase"
  opt.3b = "Three phase balanced (single clamp)"
  opt.3u = "Three phase unbalanced"
  opt.dc = "Gravity DC current sensor" 

[Q.clamp_rating]
  criteria = "variant=basic"
  type = "text"
  prompt = "What is the rating of the current clamp being used?"

[Q.adc_channel_0]
  criteria = "variant=basic"
  type = "text"
  prompt = "Which ADC channel is the first current clamp plugged into?"

[Q.adc_channel_1]
  criteria = "variant=basic & setup_basic=3u"
  type = "text"
  prompt = "Which ADC channel is the second current clamp plugged into?"

[Q.adc_channel_2]
  criteria = "variant=basic & setup_basic=3u"
  type = "text"
  prompt = "Which ADC channel is the third current clamp plugged into?"

[Q.mqtt_broker]
  criteria = "enabled=true & sensor_type=current_clamp"
  type = "text"
  prompt = "Which MQTT broker should the current sensing module send the data to?"



[OUT.module_enabled_out]
  var = "enabled"

[OUT.machine_name_out]
  var = "machine_name"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=digital_input & ( digin_device = Sequent8DigitalInputs | digin_device = Sequent16DigitalInputs)"
  value = "downtime_sequent.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=simulator"
  value = "pm_b_3pu_mock.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=grove_1 & setup_basic=1p"
  value = "pm_b_1p_grove_v1.0.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=grove_1 & setup_basic=3b"
  value = "pm_b_3pb_grove_v1.0.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=grove_1 & setup_basic=3u"
  value = "pm_b_3pu_grove_v1.0.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=grove_1 & setup_basic=dc"
  value = "pm_dc_gravity_grove_v1.0.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=grove_11 & setup_basic=1p"
  value = "pm_b_1p_grove_v1.1.toml"  

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=grove_11 & setup_basic=3b"
  value = "pm_b_3pb_grove_v1.1.toml" 

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=grove_11 & setup_basic=3u"
  value = "pm_b_3pu_grove_v1.1.toml" 

[[OUT.module_config_file_out.map]]
  criteria = "variant=basic & adc=grove_11 & setup_basic=dc"
  value = "pm_dc_gravity_grove_v1.1.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=ads & setup_basic=1p"
  value = "pm_b_1p_ads1115.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=ads & setup_basic=3b"
  value = "pm_b_3pb_ads1115.toml"  

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=ads & setup_basic=3u"
  value = "pm_b_3pu_ads1115.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=ads & setup_basic=dc"
  value = "pm_dc_gravity_ads1115.toml"

[[OUT.module_config_file_out.map]]
  criteria = "variant=basic & adc=bcr & setup_basic=1p"
  value = "pm_b_1p_bc_robotics.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=bcr & setup_basic=3b"
  value = "pm_b_3pb_bc_robotics.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=bcr & setup_basic=3u"
  value = "pm_b_3pu_bc_robotics.toml" 

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=bcr & setup_basic=dc"
  value = "pm_dc_gravity_bc_robotics.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=sequent & setup_basic=1p"
  value = "pm_b_1p_sequent.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=sequent & setup_basic=3b"
  value = "pm_b_3pb_sequent.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=basic & adc=sequent & setup_basic=3u"
  value = "pm_b_3pu_sequent.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=intermediate & phases=1p"
  value = "pm_i_1p.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=intermediate & phases=3p"
  value = "pm_i_3p.toml"

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=advanced & phases=1p"
  value = "pm_a_1p.toml" 

[[OUT.module_config_file_out.map]]
  criteria = "sensor_type=current_clamp & variant=advanced & phases=3p"
  value = "pm_a_3p.toml"

[OUT.sensor_type_out]
  var = "sensor_type"

[OUT.device_class_out]
  var = "digin_device"

[OUT.channel_out]
  var = "channel" 


[OUT.variant]
  var = "variant"

[OUT.clamp_rating]
  var = "clamp_rating"

[OUT.adc_channel_0]
  var = "adc_channel_0" 

[OUT.setup_basic]
  var = "setup_basic"

[OUT.adc_channel_1]  
  var = "adc_channel_1"

[OUT.adc_channel_2]
  var = "adc_channel_2"

[OUT.mqtt_broker]
  var = "mqtt_broker"

